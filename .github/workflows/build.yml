name: 构建 openwrt-H5000M 固件

on:
  workflow_dispatch:
    inputs:
      runner_type:
        description: 编译机器
        required: true
        type: choice
        default: github-hosted
        options:
          - github-hosted
          - self-hosted
      openwrt_ref:
        description: OpenWrt 版本
        required: true
        default: v25.12.4
      make_jobs:
        description: 编译线程，留空使用全部核心
        required: false
        default: ""
      qmodem_original:
        description: "1. QModem 原版：5G 模块管理"
        required: true
        type: boolean
        default: true
      qmodem_next:
        description: "2. QModem Next：新版界面/扩展功能"
        required: true
        type: boolean
        default: false
      upnp:
        description: "3. UPnP：端口自动映射"
        required: true
        type: boolean
        default: true
      passwall2:
        description: "4. PassWall2：代理与分流"
        required: true
        type: boolean
        default: true
      passwall:
        description: "5. PassWall：代理与分流"
        required: true
        type: boolean
        default: false
      homeproxy:
        description: "6. HomeProxy：代理插件"
        required: true
        type: boolean
        default: false
      mosdns:
        description: "7. MosDNS：DNS 分流插件"
        required: true
        type: boolean
        default: false
      vnstat:
        description: "8. vnStat2：累计流量统计"
        required: true
        type: boolean
        default: true
      mt5700m:
        description: "9. MT5700M：原生管理页面"
        required: true
        type: boolean
        default: true
      eeprom_autoflash:
        description: "10. EEPROM：首次启动自动写入 WiFi 校准数据"
        required: true
        type: boolean
        default: false
      create_release:
        description: 发布 Releases
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ inputs.runner_type == 'self-hosted' && 'LXC 本地 runner 编译' || 'GitHub 托管机编译' }}
    runs-on: ${{ fromJSON(inputs.runner_type == 'self-hosted' && '["self-hosted","Linux","X64","homelab","lxc","openwrt-h5000m"]' || '"ubuntu-24.04"') }}
    env:
      BUILD_DL_DIR: ${{ inputs.runner_type == 'self-hosted' && '/home/builder/openwrt-h5000m-cache/dl' || '' }}

    steps:
      - name: 检出项目
        uses: actions/checkout@v4

      - name: 准备 WiFi EEPROM 自动刷写文件
        if: ${{ inputs.eeprom_autoflash }}
        run: bash ./scripts/prepare-eeprom-autoflash.sh

      - name: 安装依赖
        if: ${{ inputs.runner_type == 'github-hosted' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev \
            gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool \
            libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build \
            p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply \
            python3-docutils python3-pyelftools qemu-utils re2c rsync scons \
            squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim \
            wget xmlto xxd zlib1g-dev zstd

      - name: 准备 OpenWrt 源码
        env:
          INCLUDE_QMODEM_ORIGINAL: ${{ inputs.qmodem_original && 'true' || 'false' }}
          INCLUDE_QMODEM_NEXT: ${{ inputs.qmodem_next && 'true' || 'false' }}
          INCLUDE_PASSWALL2: ${{ inputs.passwall2 && 'true' || 'false' }}
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
          INCLUDE_MOSDNS: ${{ inputs.mosdns && 'true' || 'false' }}
          INCLUDE_UPNP: ${{ inputs.upnp && 'true' || 'false' }}
          INCLUDE_HOMEPROXY: ${{ inputs.homeproxy && 'true' || 'false' }}
          INCLUDE_VNSTAT: ${{ inputs.vnstat && 'true' || 'false' }}
          INCLUDE_MT5700M: ${{ inputs.mt5700m && 'true' || 'false' }}
        run: bash ./scripts/prepare-source.sh "${{ inputs.openwrt_ref }}"

      - name: 更新软件源
        working-directory: openwrt
        env:
          INCLUDE_QMODEM_ORIGINAL: ${{ inputs.qmodem_original && 'true' || 'false' }}
          INCLUDE_QMODEM_NEXT: ${{ inputs.qmodem_next && 'true' || 'false' }}
          INCLUDE_PASSWALL2: ${{ inputs.passwall2 && 'true' || 'false' }}
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
          INCLUDE_MOSDNS: ${{ inputs.mosdns && 'true' || 'false' }}
          INCLUDE_HOMEPROXY: ${{ inputs.homeproxy && 'true' || 'false' }}
          INCLUDE_VNSTAT: ${{ inputs.vnstat && 'true' || 'false' }}
          INCLUDE_MT5700M: ${{ inputs.mt5700m && 'true' || 'false' }}
        run: |
          for attempt in 1 2 3; do
            if ./scripts/feeds update -a; then
              break
            fi

            echo "软件源更新失败，清理 small_package 中未使用且可能损坏的 webd 包后重试：${attempt}/3"
            rm -rf feeds/small_package/webd
            if [ "${attempt}" = "3" ]; then
              echo "软件源更新重试失败。"
              exit 1
            fi
            sleep 5
          done
          cd ..
          bash ./scripts/install-feeds.sh

      - name: 修复第三方 feed
        run: bash ./scripts/patch-feeds.sh

      - name: 写入插件选择
        env:
          INCLUDE_QMODEM_ORIGINAL: ${{ inputs.qmodem_original && 'true' || 'false' }}
          INCLUDE_QMODEM_NEXT: ${{ inputs.qmodem_next && 'true' || 'false' }}
          INCLUDE_PASSWALL2: ${{ inputs.passwall2 && 'true' || 'false' }}
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
          INCLUDE_MOSDNS: ${{ inputs.mosdns && 'true' || 'false' }}
          INCLUDE_UPNP: ${{ inputs.upnp && 'true' || 'false' }}
          INCLUDE_HOMEPROXY: ${{ inputs.homeproxy && 'true' || 'false' }}
          INCLUDE_VNSTAT: ${{ inputs.vnstat && 'true' || 'false' }}
          INCLUDE_MT5700M: ${{ inputs.mt5700m && 'true' || 'false' }}
        run: bash ./scripts/apply-package-options.sh

      - name: 配置本地 runner 缓存
        if: ${{ inputs.runner_type == 'self-hosted' }}
        run: |
          mkdir -p "${BUILD_DL_DIR}"
          {
            echo "# CONFIG_DEVEL is not set"
            echo "# CONFIG_TOOLCHAINOPTS is not set"
            echo "# CONFIG_CCACHE is not set"
            echo "# CONFIG_GDB is not set"
            echo "# CONFIG_GDB_PYTHON is not set"
          } >> openwrt/.config

      - name: 生成配置
        working-directory: openwrt
        run: make defconfig

      - name: 关闭调试工具链
        working-directory: openwrt
        run: |
          sed -i \
            -e '/^CONFIG_DEVEL=/d' \
            -e '/^# CONFIG_DEVEL is not set/d' \
            -e '/^CONFIG_TOOLCHAINOPTS=/d' \
            -e '/^# CONFIG_TOOLCHAINOPTS is not set/d' \
            -e '/^CONFIG_CCACHE=/d' \
            -e '/^# CONFIG_CCACHE is not set/d' \
            -e '/^CONFIG_CCACHE_DIR=/d' \
            -e '/^CONFIG_GDB=/d' \
            -e '/^# CONFIG_GDB is not set/d' \
            -e '/^CONFIG_GDB_PYTHON=/d' \
            -e '/^# CONFIG_GDB_PYTHON is not set/d' \
            .config
          {
            echo "# CONFIG_DEVEL is not set"
            echo "# CONFIG_TOOLCHAINOPTS is not set"
            echo "# CONFIG_CCACHE is not set"
            echo "# CONFIG_GDB is not set"
            echo "# CONFIG_GDB_PYTHON is not set"
          } >> .config
          grep -E '^(CONFIG_DEVEL|CONFIG_TOOLCHAINOPTS|CONFIG_CCACHE|CONFIG_GDB|CONFIG_GDB_PYTHON)=|^# CONFIG_(DEVEL|TOOLCHAINOPTS|CCACHE|GDB)' .config || true

      - name: 检查插件
        env:
          INCLUDE_QMODEM_ORIGINAL: ${{ inputs.qmodem_original && 'true' || 'false' }}
          INCLUDE_QMODEM_NEXT: ${{ inputs.qmodem_next && 'true' || 'false' }}
          INCLUDE_PASSWALL2: ${{ inputs.passwall2 && 'true' || 'false' }}
          INCLUDE_PASSWALL: ${{ inputs.passwall && 'true' || 'false' }}
          INCLUDE_MOSDNS: ${{ inputs.mosdns && 'true' || 'false' }}
          INCLUDE_UPNP: ${{ inputs.upnp && 'true' || 'false' }}
          INCLUDE_HOMEPROXY: ${{ inputs.homeproxy && 'true' || 'false' }}
          INCLUDE_VNSTAT: ${{ inputs.vnstat && 'true' || 'false' }}
          INCLUDE_MT5700M: ${{ inputs.mt5700m && 'true' || 'false' }}
        run: bash ./scripts/verify-package-options.sh

      - name: 调试 MosDNS
        if: ${{ inputs.mosdns }}
        working-directory: openwrt
        run: |
          echo "========================================"
          echo "OpenWrt Version"
          echo "========================================"
          git rev-parse HEAD || true
          git describe --tags || true

          echo
          echo "========================================"
          echo "Feeds"
          echo "========================================"
          cat feeds.conf.default

          echo
          echo "========================================"
          echo "Installed Feeds"
          echo "========================================"
          ./scripts/feeds list -f

          echo
          echo "========================================"
          echo "MosDNS Package Location"
          echo "========================================"
          find package feeds -type d -name mosdns

          echo
          echo "========================================"
          echo "LuCI MosDNS Package Location"
          echo "========================================"
          find package feeds -type d -name luci-app-mosdns

          echo
          echo "========================================"
          echo "MosDNS Makefile"
          echo "========================================"
          find package feeds -path "*/mosdns/Makefile" \
            -exec echo "===== {} =====" \; \
            -exec cat {} \;

          echo
          echo "========================================"
          echo "LuCI MosDNS Makefile"
          echo "========================================"
          find package feeds -path "*/luci-app-mosdns/Makefile" \
            -exec echo "===== {} =====" \; \
            -exec cat {} \;

          echo
          echo "========================================"
          echo "Search adblock_set"
          echo "========================================"
          grep -R "adblock_set" package feeds -n || true

          echo
          echo "========================================"
          echo "Search adblock-set"
          echo "========================================"
          grep -R "adblock-set" package feeds -n || true

          echo
          echo "========================================"
          echo "Search blocklist"
          echo "========================================"
          grep -R "blocklist" package feeds -n || true

          echo
          echo "========================================"
          echo "Search GO build options"
          echo "========================================"
          grep -R "GO_PKG_BUILD" package feeds -n || true
          grep -R "GO_PKG_LDFLAGS" package feeds -n || true
          grep -R "go build" package feeds -n || true

          echo
          echo "========================================"
          echo ".config"
          echo "========================================"
          grep MOSDNS .config || true

          echo
          echo "========================================"
          echo "MosDNS source files"
          echo "========================================"
          find package/feeds/small_package/mosdns -maxdepth 2 -type f | sort || true

          echo
          echo "========================================"
          echo "LuCI MosDNS source files"
          echo "========================================"
          find package/feeds/small_package/luci-app-mosdns -maxdepth 3 -type f | sort || true

          echo
          echo "========================================"
          echo "Git status"
          echo "========================================"
          git status

          echo
          echo "========================================"
          echo "Git remotes"
          echo "========================================"
          git remote -v

          echo
          echo "========================================"
          echo "Debug Finished"
          echo "========================================"
      
      - name: 显示 small-package 版本
        if: ${{ inputs.mosdns }}
        working-directory: openwrt
        run: |
          echo "===== small-package ====="
          cd feeds/small_package
          git rev-parse HEAD
          git log -1 --oneline
      
      - name: 下载源码包
        working-directory: openwrt
        run: |
          if [ -n "${BUILD_DL_DIR}" ]; then
            make DL_DIR="${BUILD_DL_DIR}" download -j"$(nproc)"
          else
            make download -j"$(nproc)"
          fi

      - name: Prebuild host ninja
        working-directory: openwrt
        run: make tools/ninja/compile -j1

      - name: 编译固件
        id: compile
        working-directory: openwrt
        run: |
          make_args=()
          if [ -n "${BUILD_DL_DIR}" ]; then
            make_args+=(DL_DIR="${BUILD_DL_DIR}")
          fi
          if [ -n "${{ inputs.make_jobs }}" ]; then
            make "${make_args[@]}" -j"${{ inputs.make_jobs }}"
          else
            make "${make_args[@]}" -j"$(nproc)"
          fi

      - name: 输出失败详情
        if: ${{ failure() && steps.compile.outcome == 'failure' }}
        working-directory: openwrt
        run: |
          echo "编译失败，输出 OpenWrt 构建日志摘要。"
          if [ -d logs ]; then
            find logs -type f | sort
            find logs -type f | sort | while read -r log; do
              echo "::group::${log}"
              tail -n 240 "${log}" || true
              echo "::endgroup::"
            done
          fi
          echo "执行单线程 package/install 以输出 rootfs 安装失败点。"
          timeout 15m make package/install V=s || true
          echo "执行单线程详细编译以输出真实失败点。"
          timeout 45m make -j1 V=s || true

      - name: 上传失败日志
        if: ${{ failure() && steps.compile.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-H5000M-build-logs-${{ github.run_number }}
          path: openwrt/logs/**
          if-no-files-found: ignore

      - name: 清理无关启动文件
        working-directory: openwrt
        run: |
          find bin/targets/mediatek/filogic -maxdepth 1 -type f -name 'mt798*-ram-*-bl2.bin' -delete
          find bin/targets/mediatek/filogic -maxdepth 1 -type f -name 'mt798*-ram-*-bl2.bin' -print

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-H5000M-${{ inputs.openwrt_ref }}
          path: |
            openwrt/bin/targets/mediatek/filogic/*

      - name: 准备发布
        if: ${{ inputs.create_release }}
        run: |
          safe_ref="$(printf '%s' '${{ inputs.openwrt_ref }}' | tr '/:@ ' '----')"
          echo "RELEASE_TAG=openwrt-H5000M-${safe_ref}-${{ github.run_number }}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=openwrt-H5000M ${{ inputs.openwrt_ref }} 第 ${{ github.run_number }} 次构建" >> "$GITHUB_ENV"

      - name: 发布 Releases
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: openwrt-H5000M ${{ inputs.openwrt_ref }} build ${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          make_latest: false
          files: openwrt/bin/targets/mediatek/filogic/*
